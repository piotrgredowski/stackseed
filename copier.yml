_subdirectory: template
_answers_file: ""

_exclude:
  - _source_shared
  - _source_backend
  - _source_frontend
  - "{% if backend != 'python' %}{{ backend_prefix }}pyproject.toml{% endif %}"
  - "{% if backend != 'python' %}{{ backend_prefix }}tests{% endif %}"
  - "{% if backend != 'go' %}{{ backend_prefix }}go.mod{% endif %}"
  - "{% if backend != 'go' or backend_mode != 'cli' %}{{ backend_prefix }}go.sum{% endif %}"
  - "{% if backend != 'go' %}{{ backend_prefix }}cmd{% endif %}"
  - "{% if backend != 'go' %}{{ backend_prefix }}internal{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}package.json{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}index.html{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}vite.config.ts{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}tailwind.config.ts{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}postcss.config.cjs{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}tsconfig.json{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}tsconfig.node.json{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}components.json{% endif %}"
  - "{% if backend != 'python' %}{{ backend_prefix }}src/{{ project_slug | replace('-', '_') }}{% endif %}"
  - "{% if backend != 'python' or backend_mode != 'cli' %}{{ backend_prefix }}src/{{ project_slug | replace('-', '_') }}/cli.py{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/main.tsx{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/App.tsx{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/App.test.tsx{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/index.css{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/lib{% endif %}"
  - "{% if frontend != 'solid_tailwind_shadcn' %}{{ frontend_prefix }}src/components{% endif %}"
  - "{% if backend != 'python' and frontend != 'solid_tailwind_shadcn' %}src{% endif %}"
  - "{% if backend not in ['python', 'go'] or backend_mode != 'cli' or config_enabled != 'true' %}{{ backend_prefix }}config{% endif %}"


project_name:
  type: str
  help: Human-readable project name.

project_slug:
  type: str
  help: Filesystem- and package-friendly project slug.
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$')) -%}
    project_slug must start with a lowercase letter and contain only lowercase letters, digits, and single hyphens.
    {%- endif %}

description:
  type: str
  help: Short project description.

author_name:
  type: str
  help: Project author or owning team.

license:
  type: str
  help: Project license identifier.
  default: MIT

backend:
  type: str
  help: Backend stack to generate.
  choices:
    Python: python
    Go: go
    None: none
  default: none

backend_mode:
  type: str
  help: Backend mode to document and scaffold when applicable.
  choices:
    Library/service: library
    CLI: cli
  default: library

python_cli_framework:
  type: str
  help: Python CLI framework when generating a Python CLI backend.
  choices:
    argparse: argparse
    click: click
  default: argparse
  when: "{{ backend == 'python' and backend_mode == 'cli' }}"

frontend:
  type: str
  help: Frontend stack to generate.
  choices:
    Solid + Tailwind + shadcn-solid: solid_tailwind_shadcn
    None: none
  default: none

backend_prefix:
  type: str
  default: >-
    {% if backend in ['python', 'go'] and frontend == 'solid_tailwind_shadcn' %}backend/{% endif %}
  when: false

frontend_prefix:
  type: str
  default: >-
    {% if backend in ['python', 'go'] and frontend == 'solid_tailwind_shadcn' %}frontend/{% endif %}
  when: false

config_enabled:
  type: str
  help: Include a config scaffold for generated CLI stacks.
  choices:
    "true": "true"
    "false": "false"
  default: "false"

ci_provider:
  type: str
  help: Continuous integration provider.
  choices:
    GitHub Actions: github
  default: github
